<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 font-sans min-h-screen text-slate-800">

    <div class="max-w-6xl mx-auto px-4 py-8">
        <header class="flex justify-between items-center mb-8 pb-4 border-b border-slate-200">
            <div class="flex items-center gap-3">
                <div class="bg-emerald-600 text-white p-2.5 rounded-xl shadow-md">
                    <i class="fa-solid fa-wallet text-xl"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-bold tracking-tight text-slate-900">Expense Tracker Dashboard</h1>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-xs">
                <p class="text-xs font-semibold uppercase text-slate-400">Total Income</p>
                <h3 id="total-income" class="text-2xl font-bold text-emerald-600">₹0.00</h3>
            </div>
            <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-xs">
                <p class="text-xs font-semibold uppercase text-slate-400">Total Expenses</p>
                <h3 id="total-expenses" class="text-2xl font-bold text-rose-600">₹0.00</h3>
            </div>
            <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-xs">
                <p class="text-xs font-semibold uppercase text-slate-400">Net Balance</p>
                <h3 id="net-balance" class="text-2xl font-bold text-slate-900">₹0.00</h3>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-1">
                <div class="bg-white rounded-2xl p-6 border border-slate-200 shadow-xs sticky top-8">
                    <h2 class="text-lg font-semibold mb-4">Add Transaction</h2>
                    <form id="transaction-form" class="space-y-4">
                        <input type="text" id="tx-desc" required placeholder="Description" class="w-full px-3.5 py-2 rounded-xl border border-slate-200 text-sm">
                        <input type="number" id="tx-amount" required placeholder="Amount" class="w-full px-3.5 py-2 rounded-xl border border-slate-200 text-sm">
                        <select id="tx-type" class="w-full px-3.5 py-2 rounded-xl border border-slate-200 text-sm bg-white">
                            <option value="income">Income</option>
                            <option value="expense">Expense</option>
                        </select>
                        <button type="submit" class="w-full bg-emerald-600 text-white py-2.5 rounded-xl text-sm">Add</button>
                    </form>
                </div>
            </div>
            <div class="lg:col-span-2">
                <div id="tx-container" class="space-y-3"></div>
            </div>
        </div>
    </div>

    <script>
        let transactions = JSON.parse(localStorage.getItem('transactions')) || [];
        function updateDashboard() {
            let income = 0, expense = 0;
            transactions.forEach(t => { if(t.type === 'income') income += t.amount; else expense += t.amount; });
            document.getElementById('total-income').innerText = `₹${income.toFixed(2)}`;
            document.getElementById('total-expenses').innerText = `₹${expense.toFixed(2)}`;
            document.getElementById('net-balance').innerText = `₹${(income - expense).toFixed(2)}`;
        }
        function renderTransactions() {
            const container = document.getElementById('tx-container');
            container.innerHTML = transactions.map(t => `
                <div class="bg-white p-4 border border-slate-200 flex justify-between items-center rounded-xl">
                    <span>${t.desc}</span>
                    <span class="font-bold ${t.type === 'income' ? 'text-emerald-600' : 'text-rose-600'}">₹${t.amount.toFixed(2)}</span>
                </div>
            `).join('');
        }
        document.getElementById('transaction-form').addEventListener('submit', (e) => {
            e.preventDefault();
            transactions.unshift({ id: Date.now(), desc: document.getElementById('tx-desc').value, amount: parseFloat(document.getElementById('tx-amount').value), type: document.getElementById('tx-type').value });
            localStorage.setItem('transactions', JSON.stringify(transactions));
            updateDashboard(); renderTransactions(); e.target.reset();
        });
        updateDashboard(); renderTransactions();
    </script>
</body>
</html>
